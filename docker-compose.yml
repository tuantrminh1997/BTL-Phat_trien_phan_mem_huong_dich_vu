services:
  # ──────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: soccer_rest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soccer_rest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d soccer_rest" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────
  # Spring Boot Application
  # ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soccer_rest_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://db:5432/soccer_rest
      JDBC_DATABASE_USERNAME: postgres
      JDBC_DATABASE_PASSWORD: "123456"
      JDBC_DATABASE_DRIVER: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

